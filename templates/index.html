<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Miad Akbari</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <nav>
        <a href="#" class="logo">{miad}</a>
        <div class="nav-links">
            <a href="#about">About</a>
            <a href="#skills">Skills</a>
            <a href="#experience">Experience</a>
            <a href="#contact">Contact</a>
        </div>
    </nav>
    <section class="hero">
        <div class="hero-content">
            <h1>Hi, I'm <span class="highlight">Miad Akbari</span></h1>
            <p class="hero-title">DevOps Engineer — I automate infrastructure</p>
        </div>
        <div class="hero-terminal">
            <div class="terminal-header">
                <span class="dot red"></span>
                <span class="dot yellow"></span>
                <span class="dot green"></span>
                <span class="terminal-title">miad@devops ~ $</span>
            </div>
            <div class="terminal-body">
                <p><span class="prompt">$</span> kubectl get clusters</p>
                <p class="output">prod-01    Ready    180d</p>
            </div>
        </div>
    </section>
    <section id="about">
        <h2>About Me</h2>
        <p>I'm a DevOps Engineer based in Tehran, Iran.</p>
    </section>
    <section id="skills">
        <h2>Skills</h2>
        <div class="skills-grid">
            <div class="skill-card"><i class="fas fa-dharmachakra"></i> Kubernetes</div>
            <div class="skill-card"><i class="fab fa-docker"></i> Docker</div>
            <div class="skill-card"><i class="fas fa-code"></i> Terraform</div>
            <div class="skill-card"><i class="fas fa-cogs"></i> Ansible</div>
        </div>
    </section>
</body>
</html>
